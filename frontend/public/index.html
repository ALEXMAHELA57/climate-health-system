<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="AfyaHewa — Climate Health Early Warning System for Tanzania" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AfyaHewa" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>AfyaHewa</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; }
      /* Splash screen — shown instantly before React loads */
      #splash {
        position: fixed; inset: 0; background: #2563eb;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s ease;
      }
      #splash .logo { font-size: 48px; margin-bottom: 12px; }
      #splash .name { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 4px; }
      #splash .sub  { color: rgba(255,255,255,0.7); font-size: 13px; }
      #splash .dots { display: flex; gap: 6px; margin-top: 24px; }
      #splash .dot  {
        width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5);
        animation: pulse 1.2s ease-in-out infinite;
      }
      #splash .dot:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes pulse { 0%,80%,100%{opacity:0.3} 40%{opacity:1} }
    </style>
  </head>
  <body>
    <!-- Splash shown immediately — hidden once React mounts -->
    <div id="splash">
      <div class="logo">🌍</div>
      <div class="name">AfyaHewa</div>
      <div class="sub">Climate Health System · Tanzania</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash as soon as React renders something into #root
      const observer = new MutationObserver(() => {
        if (document.getElementById('root').children.length > 0) {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });

      // Safety fallback — remove splash after 5s regardless
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300); }
      }, 5000);
    </script>
  </body>
</html>
