<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="Tanzania Climate Health Early Warning System - Real-time health alerts and symptom checker" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AfyaHewa" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Open Graph for sharing -->
    <meta property="og:title" content="AfyaHewa - Tanzania Climate Health System" />
    <meta property="og:description" content="Real-time climate health alerts, symptom checker, and emergency contacts for Tanzania" />
    <meta property="og:type" content="website" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/icons/icon-96x96.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192x192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>AfyaHewa - Tanzania Climate Health</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { 
        font-family: system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      #root { min-height: 100vh; }
      /* Splash screen while loading */
      #splash {
        position: fixed; inset: 0;
        background: #2563eb;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-icon { font-size: 64px; margin-bottom: 16px; }
      #splash-title { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
      #splash-sub { color: rgba(255,255,255,0.8); font-size: 13px; }
      #splash-spinner {
        width: 32px; height: 32px; margin-top: 24px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-icon">🌍</div>
      <div id="splash-title">AfyaHewa</div>
      <div id="splash-sub">Tanzania Climate Health System</div>
      <div id="splash-spinner"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Hide splash screen when app loads
      window.addEventListener("load", function() {
        setTimeout(function() {
          var splash = document.getElementById("splash");
          if (splash) {
            splash.classList.add("hidden");
            setTimeout(function() { splash.remove(); }, 300);
          }
        }, 1200);
      });

      // Register service worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function() {
          navigator.serviceWorker.register("/service-worker.js")
            .then(function(reg) {
              console.log("Service worker registered:", reg.scope);
            })
            .catch(function(err) {
              console.log("Service worker registration failed:", err);
            });
        });
      }
    </script>
  </body>
</html>
